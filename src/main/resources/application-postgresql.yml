# Perfil PostgreSQL - Actívalo con: spring.profiles.active=postgresql
# Usar con: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=postgresql"

spring:
  application:
    name: pedidos-api
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        use_sql_comments: true
  datasource:
    url: jdbc:postgresql://localhost:5432/pedidosdb
    driverClassName: org.postgresql.Driver
    username: postgres
    password: password # Cambia esto con tu contraseña PostgreSQL
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

logging:
  level:
    root: INFO
    com.equipo4.pedidosapi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    display-request-duration: true
    doc-expansion: list
  show-actuator: false
  api-docs-url: /v3/api-docs
  swagger-ui-url: /swagger-ui.html
  use-fqn: false

server:
  servlet:
    context-path: /api
  port: 8080
